<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OSION Ferienhaus Diagnose</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        :root {
            /* Exaktes Schwarz vom Screenshot */
            --bg-primary: #0a0a0c;
            --bg-secondary: #121214;
            --bg-tertiary: #1a1a1d;
            --bg-card: #151518;
            
            /* OSION Brand Colors */
            --accent-rose: #f43f5e;
            --accent-violet: #8b5cf6;
            --accent-purple: #a855f7;
            --accent-magenta: #d946ef;
            
            /* Text */
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            
            /* Border */
            --border-subtle: #27272a;
            --border-glow: rgba(139, 92, 246, 0.3);
            
            /* Gradients */
            --gradient-primary: linear-gradient(135deg, var(--accent-rose) 0%, var(--accent-violet) 50%, var(--accent-magenta) 100%);
            --gradient-subtle: linear-gradient(180deg, rgba(139,92,246,0.08) 0%, transparent 100%);
        }
        
        html, body {
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        
        .funnel-container {
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        /* Background Pattern */
        .funnel-bg {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(139,92,246,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(244,63,94,0.05) 0%, transparent 50%),
                var(--bg-primary);
            z-index: 0;
        }
        
        .funnel-content {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 24px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }
        
        /* Header */
        .funnel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-subtle);
        }
        
        .funnel-logo {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .funnel-progress {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .progress-text {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }
        
        .progress-text span {
            color: var(--text-primary);
        }
        
        .progress-bar {
            width: 80px;
            height: 4px;
            background: var(--bg-tertiary);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--gradient-primary);
            border-radius: 2px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px rgba(139,92,246,0.5);
        }
        
        /* Screen Container */
        .screen-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            opacity: 0;
            transform: translateX(50px);
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .screen.active {
            opacity: 1;
            transform: translateX(0);
            pointer-events: all;
        }
        
        .screen.prev {
            transform: translateX(-50px);
        }
        
        /* Question Screen */
        .question-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent-violet);
            margin-bottom: 16px;
        }
        
        .question-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--accent-violet);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-violet);
        }
        
        .question-title {
            font-size: clamp(1.25rem, 4vw, 1.625rem);
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 28px;
            color: var(--text-primary);
        }
        
        /* Options Grid */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .option-btn {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 18px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: left;
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 500;
            line-height: 1.4;
        }
        
        .option-btn:hover {
            border-color: var(--border-glow);
            background: var(--bg-tertiary);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        
        .option-btn.selected {
            border-color: var(--accent-violet);
            background: linear-gradient(145deg, rgba(139,92,246,0.15), rgba(244,63,94,0.05));
            box-shadow: 0 0 20px rgba(139,92,246,0.2);
        }
        
        .option-radio {
            width: 22px;
            height: 22px;
            border: 2px solid var(--border-subtle);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.25s ease;
        }
        
        .option-btn.selected .option-radio {
            border-color: var(--accent-violet);
            background: var(--accent-violet);
        }
        
        .option-btn.selected .option-radio::after {
            content: '';
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
        }
        
        /* Navigation */
        .nav-bar {
            display: flex;
            gap: 12px;
            padding-top: 20px;
        }
        
        .nav-btn {
            flex: 1;
            padding: 16px 24px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .nav-btn-primary {
            background: var(--gradient-primary);
            color: white;
            position: relative;
            overflow: hidden;
        }
        
        .nav-btn-primary::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }
        
        .nav-btn-primary:hover::before {
            transform: translateX(100%);
        }
        
        .nav-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(139,92,246,0.4);
        }
        
        .nav-btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        
        .nav-btn-secondary {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-subtle);
        }
        
        .nav-btn-secondary:hover {
            border-color: var(--border-glow);
            color: var(--text-primary);
        }
        
        /* Results Screen */
        .results-header {
            text-align: center;
            margin-bottom: 24px;
        }
        
        .results-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            background: var(--gradient-primary);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 16px 40px rgba(139,92,246,0.3);
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        
        .results-title {
            font-size: clamp(1.375rem, 4vw, 1.75rem);
            font-weight: 700;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #fff, #a1a1aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .results-subtitle {
            font-size: 14px;
            color: var(--text-muted);
        }
        
        /* Diagnosis Card */
        .diagnosis-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
        }
        
        .diagnosis-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent-violet);
            margin-bottom: 8px;
        }
        
        .diagnosis-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 12px;
        }
        
        .diagnosis-text {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.7;
        }
        
        .consequence-box {
            background: linear-gradient(135deg, rgba(244,63,94,0.1), rgba(139,92,246,0.08));
            border-left: 3px solid var(--accent-rose);
            padding: 16px;
            border-radius: 0 12px 12px 0;
            margin-bottom: 16px;
        }
        
        .consequence-box p {
            font-size: 14px;
            color: var(--text-secondary);
            font-style: italic;
            line-height: 1.6;
        }
        
        /* CTA Box */
        .cta-box {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            position: relative;
        }
        
        .cta-box::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            padding: 1px;
            background: var(--gradient-primary);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.4;
        }
        
        .cta-title {
            font-size: 1.125rem;
            font-weight: 700;
            margin-bottom: 10px;
            position: relative;
        }
        
        .cta-text {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 16px;
            position: relative;
        }
        
        .roi-badge {
            background: linear-gradient(135deg, rgba(16,185,129,0.15), rgba(245,158,11,0.1));
            border: 1px solid rgba(16,185,129,0.3);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 16px;
            position: relative;
        }
        
        .roi-badge p {
            font-size: 14px;
            color: #10b981;
            font-weight: 600;
        }
        
        .cta-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: var(--gradient-primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }
        
        .cta-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }
        
        .cta-btn:hover::before {
            transform: translateX(100%);
        }
        
        /* Scrollable area for results */
        .results-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding-right: 4px;
            margin-right: -4px;
        }
        
        .results-scroll::-webkit-scrollbar {
            width: 4px;
        }
        
        .results-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .results-scroll::-webkit-scrollbar-thumb {
            background: var(--border-subtle);
            border-radius: 2px;
        }
        
        /* Mobile optimizations */
        @media (max-width: 480px) {
            .funnel-content {
                padding: 16px;
            }
            
            .question-title {
                font-size: 1.125rem;
            }
            
            .option-btn {
                padding: 14px 16px;
                font-size: 14px;
            }
            
            .diagnosis-card {
                padding: 20px;
            }
            
            .cta-box {
                padding: 20px;
            }
        }
        
        /* Utility */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="funnel-container">
        <div class="funnel-bg"></div>
        
        <div class="funnel-content">
            <!-- Header -->
            <div class="funnel-header">
                <div class="funnel-logo">OSION</div>
                <div class="funnel-progress" id="progress-header">
                    <span class="progress-text"><span id="current-q">1</span>/8</span>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill" style="width: 12.5%"></div>
                    </div>
                </div>
            </div>
            
            <!-- Screens -->
            <div class="screen-container" id="screen-container">
                <!-- Screens will be generated by JS -->
            </div>
            
        </div>
    </div>

    <script>
        const questions = [
            {
                id: 1,
                text: "Wie ist die aktuelle Auslastung deines Ferienhauses?",
                options: ["Unter 30 %", "30–50 %", "50–70 %", "Über 70 %", "Ich weiß es nicht"],
                scores: [
                    { auslastung: 3, sichtbarkeit: 0, angebot: 0, preis: 0, strategie: 1 },
                    { auslastung: 2, sichtbarkeit: 0, angebot: 0, preis: 0, strategie: 0 },
                    { auslastung: 1, sichtbarkeit: 0, angebot: 0, preis: 0, strategie: 0 },
                    { auslastung: 0, sichtbarkeit: 0, angebot: 0, preis: 0, strategie: 0 },
                    { auslastung: 2, sichtbarkeit: 0, angebot: 0, preis: 0, strategie: 2 }
                ]
            },
            {
                id: 2,
                text: "Was ist aktuell das größte Problem?",
                options: ["Zu wenig Buchungen", "Zu wenig Anfragen", "Zu niedrige Preise", "Zu viele Lücken", "Ich weiß nicht"],
                scores: [
                    { auslastung: 2, sichtbarkeit: 1, angebot: 1, preis: 0, strategie: 1 },
                    { auslastung: 1, sichtbarkeit: 3, angebot: 1, preis: 0, strategie: 1 },
                    { auslastung: 0, sichtbarkeit: 0, angebot: 0, preis: 3, strategie: 1 },
                    { auslastung: 3, sichtbarkeit: 0, angebot: 0, preis: 1, strategie: 1 },
                    { auslastung: 1, sichtbarkeit: 1, angebot: 1, preis: 1, strategie: 3 }
                ]
            },
            {
                id: 3,
                text: "Über welche Kanäle kommen deine Buchungen?",
                options: ["Nur Airbnb", "Nur Booking.com", "Beide Plattformen", "Direktbuchungen", "Ohne Strategie"],
                scores: [
                    { auslastung: 0, sichtbarkeit: 1, angebot: 1, preis: 0, strategie: 0 },
                    { auslastung: 0, sichtbarkeit: 1, angebot: 1, preis: 0, strategie: 0 },
                    { auslastung: 0, sichtbarkeit: 0, angebot: 0, preis: 0, strategie: 0 },
                    { auslastung: 0, sichtbarkeit: 0, angebot: 0, preis: 0, strategie: 0 },
                    { auslastung: 1, sichtbarkeit: 2, angebot: 1, preis: 0, strategie: 3 }
                ]
            },
            {
                id: 4,
                text: "Wie gut wird dein Ferienhaus online gefunden?",
                options: ["Sehr schlecht", "Mittelmäßig", "Ganz gut", "Sehr gut", "Unsicher"],
                scores: [
                    { auslastung: 1, sichtbarkeit: 3, angebot: 0, preis: 0, strategie: 1 },
                    { auslastung: 0, sichtbarkeit: 2, angebot: 0, preis: 0, strategie: 0 },
                    { auslastung: 0, sichtbarkeit: 1, angebot: 0, preis: 0, strategie: 0 },
                    { auslastung: 0, sichtbarkeit: 0, angebot: 0, preis: 0, strategie: 0 },
                    { auslastung: 0, sichtbarkeit: 2, angebot: 0, preis: 0, strategie: 2 }
                ]
            },
            {
                id: 5,
                text: "Wie stark wirkt dein Inserat im Vergleich?",
                options: ["Eher schwach", "Durchschnitt", "Ganz gut", "Sehr professionell", "Kein Vergleich"],
                scores: [
                    { auslastung: 1, sichtbarkeit: 1, angebot: 3, preis: 0, strategie: 1 },
                    { auslastung: 0, sichtbarkeit: 0, angebot: 2, preis: 0, strategie: 0 },
                    { auslastung: 0, sichtbarkeit: 0, angebot: 1, preis: 0, strategie: 0 },
                    { auslastung: 0, sichtbarkeit: 0, angebot: 0, preis: 0, strategie: 0 },
                    { auslastung: 0, sichtbarkeit: 1, angebot: 2, preis: 0, strategie: 2 }
                ]
            },
            {
                id: 6,
                text: "Wie sicher bist du bei der Preisstrategie?",
                options: ["Sehr unsicher", "Orientiere mich an anderen", "Passe gelegentlich an", "Durchdachte Strategie", "Weiß nicht"],
                scores: [
                    { auslastung: 0, sichtbarkeit: 0, angebot: 0, preis: 3, strategie: 1 },
                    { auslastung: 0, sichtbarkeit: 0, angebot: 0, preis: 2, strategie: 0 },
                    { auslastung: 0, sichtbarkeit: 0, angebot: 0, preis: 1, strategie: 0 },
                    { auslastung: 0, sichtbarkeit: 0, angebot: 0, preis: 0, strategie: 0 },
                    { auslastung: 0, sichtbarkeit: 0, angebot: 0, preis: 2, strategie: 2 }
                ]
            },
            {
                id: 7,
                text: "Was ist dir das wichtigste Ziel?",
                options: ["Mehr Buchungen", "Höhere Auslastung", "Bessere Preise", "Weniger Leerstand", "Gesamtstrategie"],
                scores: [
                    { auslastung: 2, sichtbarkeit: 1, angebot: 1, preis: 0, strategie: 0 },
                    { auslastung: 3, sichtbarkeit: 0, angebot: 0, preis: 0, strategie: 0 },
                    { auslastung: 0, sichtbarkeit: 0, angebot: 0, preis: 3, strategie: 0 },
                    { auslastung: 2, sichtbarkeit: 1, angebot: 0, preis: 1, strategie: 0 },
                    { auslastung: 0, sichtbarkeit: 0, angebot: 0, preis: 0, strategie: 3 }
                ]
            },
            {
                id: 8,
                text: "Wie dringend möchtest du verbessern?",
                options: ["Sofort", "Nächste Wochen", "1–3 Monate", "Langfristig", "Erst verstehen"],
                scores: [
                    { auslastung: 1, sichtbarkeit: 1, angebot: 0, preis: 0, strategie: 0 },
                    { auslastung: 0, sichtbarkeit: 0, angebot: 0, preis: 0, strategie: 0 },
                    { auslastung: 0, sichtbarkeit: 0, angebot: 0, preis: 0, strategie: 0 },
                    { auslastung: 0, sichtbarkeit: 0, angebot: 0, preis: 0, strategie: 0 },
                    { auslastung: 0, sichtbarkeit: 0, angebot: 0, preis: 0, strategie: 2 }
                ]
            }
        ];

        const diagnoses = {
            auslastung: {
                title: "Auslastungsproblem",
                text: "Dein Ferienhaus schöpft sein Potenzial nicht konstant aus. Entscheidend ist jetzt ein strukturierter Plan, der Kalenderlücken, Buchungsphasen und Angebotswirkung zusammen betrachtet."
            },
            sichtbarkeit: {
                title: "Sichtbarkeitsproblem",
                text: "Dein Ferienhaus muss erst von passenden Gästen gefunden werden. Hier entscheidet nicht ein einzelner Plattform-Eintrag, sondern die gesamte Auffindbarkeit und Positionierung."
            },
            angebot: {
                title: "Angebotsproblem",
                text: "Dein Ferienhaus kann gut sein und trotzdem zu wenig Buchungen erzielen, wenn Bilder, Texte und Vertrauen nicht stark genug wirken."
            },
            preis: {
                title: "Preisstrategieproblem",
                text: "Wenn Preise nicht zur Nachfrage, Saison und Zielgruppe passen, entstehen entweder Leerstand oder verschenktes Umsatzpotenzial."
            },
            strategie: {
                title: "Strategieproblem",
                text: "Ohne strukturierten Handlungsplan bleibt oft unklar, welche Maßnahme zuerst den größten Effekt bringt."
            }
        };

        let currentScreen = 0;
        let answers = [];
        let scores = { auslastung: 0, sichtbarkeit: 0, angebot: 0, preis: 0, strategie: 0 };

        function init() {
            const container = document.getElementById('screen-container');
            
            // Create question screens
            questions.forEach((q, idx) => {
                const screen = document.createElement('div');
                screen.className = 'screen' + (idx === 0 ? ' active' : '');
                screen.id = `screen-${idx}`;
                
                const optionsHtml = q.options.map((opt, optIdx) => `
                    <button class="option-btn" onclick="selectOption(${idx}, ${optIdx}, this)">
                        <div class="option-radio"></div>
                        <span>${opt}</span>
                    </button>
                `).join('');
                
                screen.innerHTML = `
                    <div class="question-badge">Frage ${idx + 1}</div>
                    <h2 class="question-title">${q.text}</h2>
                    <div class="options-grid">
                        ${optionsHtml}
                    </div>
                    <div class="nav-bar">
                        <button class="nav-btn nav-btn-secondary" onclick="prevScreen()" ${idx === 0 ? 'style="visibility:hidden"' : ''}>← Zurück</button>
                        <button class="nav-btn nav-btn-primary" id="next-${idx}" onclick="nextScreen()" disabled>Weiter →</button>
                    </div>
                `;
                
                container.appendChild(screen);
            });
            
            // Create results screen
            const resultsScreen = document.createElement('div');
            resultsScreen.className = 'screen';
            resultsScreen.id = 'screen-results';
            resultsScreen.innerHTML = `
                <div class="results-scroll">
                    <div class="results-header">
                        <div class="results-icon">📊</div>
                        <div class="results-title">Deine Ergebnisse</div>
                        <div class="results-subtitle">Basierend auf deinen Antworten</div>
                    </div>
                    
                    <div class="diagnosis-card">
                        <div class="diagnosis-label">Hauptdiagnose</div>
                        <div class="diagnosis-title" id="diag-title"></div>
                        <div class="diagnosis-text" id="diag-text"></div>
                    </div>
                    
                    <div class="consequence-box">
                        <p>Ohne strukturierten Plan werden einzelne Änderungen ausprobiert, ohne die Ursache zu bearbeiten.</p>
                    </div>
                    
                    <div class="cta-box">
                        <div class="cta-title">OSION-Handlungsplan</div>
                        <div class="cta-text">Zeigt dir, welche Hebel du in welcher Reihenfolge angebst.</div>
                        <div class="roi-badge">
                            <p>💡 Eine zusätzliche Buchung bezahlt den Plan mehrfach</p>
                        </div>
                        <a href="#angebot" class="cta-btn">Handlungsplan ansehen →</a>
                    </div>
                </div>
                
                <div class="nav-bar" style="padding-top:12px">
                    <button class="nav-btn nav-btn-secondary" onclick="restart()">↻ Neu starten</button>
                </div>
            `;
            container.appendChild(resultsScreen);
        }

        function selectOption(screenIdx, optIdx, btn) {
            // Remove selected from all options in this screen
            const screen = document.getElementById(`screen-${screenIdx}`);
            screen.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            
            // Enable next button
            document.getElementById(`next-${screenIdx}`).disabled = false;
            
            // Store answer
            answers[screenIdx] = optIdx;
            
            // Add scores
            const q = questions[screenIdx];
            const score = q.scores[optIdx];
            Object.keys(score).forEach(k => {
                // Reset previous scores for this question if any
                if (answers[screenIdx] !== undefined) {
                    // We'll handle this in nextScreen/prevScreen
                }
            });
        }

        function updateProgress() {
            const pct = ((currentScreen + 1) / questions.length) * 100;
            document.getElementById('progress-fill').style.width = pct + '%';
            document.getElementById('current-q').textContent = Math.min(currentScreen + 1, 8);
        }

        function nextScreen() {
            if (currentScreen < questions.length - 1) {
                // Add scores
                const q = questions[currentScreen];
                const score = q.scores[answers[currentScreen]];
                Object.keys(score).forEach(k => scores[k] += score[k]);
                
                // Animate
                document.getElementById(`screen-${currentScreen}`).classList.add('prev');
                document.getElementById(`screen-${currentScreen}`).classList.remove('active');
                
                currentScreen++;
                document.getElementById(`screen-${currentScreen}`).classList.add('active');
                updateProgress();
            } else {
                // Add last scores
                const q = questions[currentScreen];
                const score = q.scores[answers[currentScreen]];
                Object.keys(score).forEach(k => scores[k] += score[k]);
                
                // Show results
                document.getElementById(`screen-${currentScreen}`).classList.remove('active');
                document.getElementById('screen-results').classList.add('active');
                document.getElementById('progress-header').style.opacity = '0';
                
                // Set diagnosis
                const maxCat = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
                document.getElementById('diag-title').textContent = diagnoses[maxCat].title;
                document.getElementById('diag-text').textContent = diagnoses[maxCat].text;
            }
        }

        function prevScreen() {
            if (currentScreen > 0) {
                // Remove scores
                const q = questions[currentScreen];
                if (answers[currentScreen] !== undefined) {
                    const score = q.scores[answers[currentScreen]];
                    Object.keys(score).forEach(k => scores[k] -= score[k]);
                }
                
                document.getElementById(`screen-${currentScreen}`).classList.remove('active');
                currentScreen--;
                document.getElementById(`screen-${currentScreen}`).classList.add('active');
                document.getElementById(`screen-${currentScreen}`).classList.remove('prev');
                updateProgress();
            }
        }

        function restart() {
            currentScreen = 0;
            answers = [];
            scores = { auslastung: 0, sichtbarkeit: 0, angebot: 0, preis: 0, strategie: 0 };
            
            document.querySelectorAll('.screen').forEach(s => {
                s.classList.remove('active', 'prev');
            });
            document.getElementById('screen-0').classList.add('active');
            document.getElementById('progress-header').style.opacity = '1';
            
            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            document.querySelectorAll('.nav-btn-primary').forEach(b => b.disabled = true);
            
            updateProgress();
        }

        // Initialize
        init();
        updateProgress();
    </script>
